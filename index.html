<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows Tweaks | أداة تسريع النظام</title>
    <!-- استيراد المكتبات الأساسية لضمان عمل التنسيق -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* التنسيق الفخم المدمج لضمان عدم ضياعه */
        body {
            background: radial-gradient(circle at top, #02010a 0%, #050505 100%) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .main-header {
            text-align: center;
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #ffffff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }
        .container-flex {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }
        .tweak-card {
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 210, 255, 0.2) !important;
            border-radius: 20px;
            padding: 30px;
            flex: 1;
            min-width: 300px;
            max-width: 350px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .tweak-card:hover { transform: translateY(-10px); }
        .btn-custom {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%) !important;
            border: none !important;
            color: white !important;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 class="main-header">WINDOWS TWEAKS</h1>
    <div class="container-flex">
        <!-- كرت تحسين الأداء -->
        <div class="tweak-card">
            <div style="font-size: 3rem;">🚀</div>
            <h3>تحسين الأداء</h3>
            <p>نسخ أمر تسريع النظام وتقليل زمن التأخير.</p>
            <button class="btn-custom" onclick="navigator.clipboard.writeText('irm https://christitus.com/win | iex')">نسخ وتفعيل</button>
        </div>
        <!-- كرت تنظيف النظام -->
        <div class="tweak-card">
            <div style="font-size: 3rem;">🧹</div>
            <h3>تنظيف النظام</h3>
            <p>نسخ أمر حذف المخلفات والملفات المؤقتة.</p>
            <button class="btn-custom" onclick="navigator.clipboard.writeText('del /q /s /f %temp%\\*')">نسخ وتنظيف</button>
        </div>
        <!-- كرت تحسين الشبكة -->
        <div class="tweak-card">
            <div style="font-size: 3rem;">🌐</div>
            <h3>تحسين الشبكة</h3>
            <p>نسخ أمر تحسين إعدادات البنج واستقرار الاتصال.</p>
            <button class="btn-custom" onclick="navigator.clipboard.writeText('netsh int tcp set global autotuninglevel=normal')">نسخ وتحسين</button>
        </div>
    </div>
</body>
</html>
